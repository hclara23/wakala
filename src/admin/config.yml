backend:
  name: git-gateway
  branch: main

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Site Content"
    files:
      - file: "src/_data/siteContent.json"
        label: "Home Page Content"
        name: "home"
        fields:
          - label: "Intro Section"
            name: "intro"
            widget: "object"
            fields:
              - {label: "Main Title", name: "title", widget: "string"}
              - {label: "Accent Text", name: "accent", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "string"}
          
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - {label: "Service Name", name: "name", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - label: "Features"
                name: "features"
                widget: "list"
                field: {label: "Feature Item", name: "feature", widget: "string"}
          
          - label: "Booking Section"
            name: "booking"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "string"}
              - {label: "Payment Button Text", name: "payment_cta", widget: "string"}
              - {label: "Payment Note", name: "payment_note", widget: "string"}
              - {label: "Payment Item Key", name: "payment_item", widget: "string"}
  - name: "settings"
    label: "Site Settings"
    files:
      - file: "src/_data/site.json"
        label: "Global Settings"
        name: "site"
        fields:
          - {label: "Business Name", name: "name", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Site URL", name: "url", widget: "string"}
          - {label: "Locale", name: "locale", widget: "string"}
          - {label: "Phone (E.164)", name: "phone", widget: "string"}
          - {label: "Phone (Display)", name: "phone_display", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Service Area", name: "area_served", widget: "string"}
          - {label: "OG Image URL", name: "og_image", widget: "string"}
          - {label: "Google Business URL", name: "google_business_url", widget: "string"}
          - {label: "Logo Path", name: "logo", widget: "string"}
